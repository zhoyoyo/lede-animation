<!doctype html>
<html>
  <head>

    <!-- some basic stuff  -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated SVG</title>

    <!-- 
      add your stylesheet 
      base.css loads the basic stuff
      you can tweak your css in custom.css
      WARNING: the order of the stylesheets matters
    -->
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="custom.css">

    <!-- add your d3 script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <!-- add Scrollama -->
    <script src="https://unpkg.com/scrollama"></script>

    <!-- your JS code that uses d3 to manipulate data -->
    <script>

      // Step 4. load your data with d3.csv()
      d3.csv("happiness-sample-data.csv")
      // d3.json("happiness-sample-data.json")
        .then(data => {

          // using d3 time parsers to get the week and weekday of each date in the data
          const stringToTime = d3.utcParse('%m/%d/%Y');
          const getWeek = d3.utcFormat("%V");
          const getWeekDay = d3.utcFormat("%u");
          const getMonth = d3.utcFormat("%m");

          // create the SVG element and set its width and height
          const myChart = d3
            .select('#my-svg-chart')
            .append('svg')
            .attr('width', 640)
            .attr('height', 640)

          // create a circle for each data point
          const individualCharts = myChart
            .selectAll('circle')
            .data(data)
            .join('circle');

          // set the position and radius of each circle

          const gridSize = 20, 
          gap = 2;

          individualCharts
            .attr('cx', (d,i) => {
              return getWeekDay(stringToTime(d.Date)) * (gridSize + gap) + gridSize/2;
            })
            .attr('cy', (d,i) => {
              return getWeek(stringToTime(d.Date)) * (gridSize + gap) 
                + gridSize/2 + (getMonth(stringToTime(d.Date)) - 1) * gridSize*2;
            })
            .attr('r', gridSize/2)
          
          // start with grey squares, change the "fill" value
          individualCharts.style('fill','lightgrey')



          const showData = function(){
              
              individualCharts
                  .transition()
                  .duration(2000)
                  .delay((d,i) => i*10)
                  .attr('r',gridSize/2)
                  .style('fill', d=> {
                      if (d.Happiness == '1') {return 'black'}
                      else if (d.Happiness == '2') {return 'grey'}
                      else {return 'gold'}
                  })
                  .on('end', hideData)

          }

          const hideData = function(){

              individualCharts
                  .transition()
                  .duration(2000)
                  .delay((d,i) => i*10)
                  .attr('r',0)
                  .style('fill','lightgrey')
                  .on('end', showData)

          }

          // run the animation.
          showData();


          

        })

    </script>

  </head>
  <body>
    <h1>100 days of happiness</h1>
    <!-- putting your buttons here -->
    <div id="my-svg-chart">
      <p>100 days of happiness</p>
    </div>


  </body>
</html>
