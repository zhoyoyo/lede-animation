<!doctype html>
<html>
  <head>

    <!-- some basic stuff  -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated SVG</title>

    <!-- 
      add your stylesheet 
      base.css loads the basic stuff
      you can tweak your css in custom.css
      WARNING: the order of the stylesheets matters
    -->
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="custom.css">

    <!-- add your d3 script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <!-- add Scrollama -->
    <script src="https://unpkg.com/scrollama"></script>

    <!-- your JS code that uses d3 to manipulate data -->
    <script>

      // Step 4. load your data with d3.csv()
      d3.csv("happiness-sample-data.csv")
      // d3.json("happiness-sample-data.json")
        .then(data => {

          // using d3 time parsers to get the week and weekday of each date in the data
          const stringToTime = d3.utcParse('%m/%d/%Y');
          const getWeek = d3.utcFormat("%V");
          const getWeekDay = d3.utcFormat("%u");
          const getMonth = d3.utcFormat("%m");

          // create the SVG element and set its width and height
          const myChart = d3
            .select('#my-svg-chart')
            .append('svg')
            .attr('width', 640)
            .attr('height', 640)

          // create a circle for each data point
          const individualCharts = myChart
            .selectAll('circle')
            .data(data)
            .join('circle');

          // set the position and radius of each circle

          const gridSize = 20, 
          gap = 2;

          individualCharts
            .attr('cx', (d,i) => {
              return getWeekDay(stringToTime(d.Date)) * (gridSize + gap) + gridSize/2;
            })
            .attr('cy', (d,i) => {
              return getWeek(stringToTime(d.Date)) * (gridSize + gap) 
                + gridSize/2 + (getMonth(stringToTime(d.Date)) - 1) * gridSize*2;
            })
            .attr('r', 0)
          
          // start with grey squares, change the "fill" value
          individualCharts.style('fill','lightgrey')



          const showCircles = function() {
            
            const gridSizeNew = window.innerWidth / 12;

              individualCharts
                  .style('fill','lightgrey')
                  .attr("r", 0)
                  .transition()
                  .duration(500)
                  .attr("r", gridSizeNew/2)

              d3.select("p").html("Here are the 100 days.")

          }

          const showEmotions = function(personID) {

              individualCharts
                  .transition()
                  .duration(500)
                  .style('fill', d=> {
                  if (d[personID] == '1') {return 'black'}
                  else if (d[personID] == '2') {return 'lightgrey'}
                  else {return 'gold'}
                  })

              d3.select("p")
              .html(function() {
                if (personID == "Happiness") 
                 { return "This is the emotional ups-and-downs of Person 1"}
                else {return "This is the emotional ups-and-downs of Person 2"}
            })

          }

          // ======================================
          // === HERE starts the scrollama code ===
          // ======================================

          // using d3 for convenience
          const scrolly = d3.select("#scroll-content");
          const figure = scrolly.select("#my-svg-chart");
          const step = scrolly.selectAll(".step"); 

          // initialize the scrollama
          const scroller = scrollama();

          // generic window resize listener event
          function handleResize() {

              // 1. update height of step elements
              var stepH = Math.floor(window.innerHeight * 0.75);
              step.style("height", stepH + "px");

              var figureHeight = Math.min(window.innerHeight*0.8,640);
              var figureMarginTop = (window.innerHeight - figureHeight) / 2;
              
              // 2. update the height of the chart
              figure
                  .style("height", figureHeight + "px")
                  .style("top", figureMarginTop + "px");

              // updating the height and width of the squares 
              const gridSizeNew = window.innerWidth / 12
              
              individualCharts
                  .attr('cx', (d,i) => {
                    return getWeekDay(stringToTime(d.Date)) * (gridSizeNew + gap) + gridSizeNew/2;
                  })
                  .attr('cy', (d,i) => {
                    return getWeek(stringToTime(d.Date)) * (gridSizeNew + gap) 
                      + gridSizeNew/2 + (getMonth(stringToTime(d.Date)) - 1) * gridSizeNew*2;
                  })
                  .attr('r', gridSizeNew/2)



              // 3. tell scrollama to update new element dimensions
              scroller.resize();
          }

          // scrollama event handlers
          function handleStepEnter(response) {

              // add color to current step only
              step.classed("is-active", function (d, i) {
                  return i === response.index;
              });

              // update graphic based on step
              if (response.index == 0) {
                  // 1. Make the charts appear
                  showCircles()
              } else if (response.index == 1) {
                  // 2. Show Person 1 emotions
                  showEmotions('Happiness')
              } else if (response.index == 2) {
                  // 3. Show Person 2 emotions
                  showEmotions('Happiness_P2')
              }
          }

          function init() {

              // 1. force a resize on load to ensure proper dimensions are sent to scrollama
              handleResize();

              // 2. bind scrollama event handlers (this can be chained like below)

              scroller
                  .setup({
                  step: "#scroll-content .step",
                  offset: 0.33,
                  debug: false
                  })
                  .onStepEnter(handleStepEnter);

              // 3. watch for window resizing
              window.addEventListener('resize', handleResize);
          }

          // kick things off
          init();



          

        })

    </script>

  </head>

  <body>
    <h1>100 days of happiness</h1>

    <div id="scroll-content">  <!-- The overall container -->
    <div id="my-svg-chart">
      <p>100 days of happiness</p>
    </div> <!-- Your chart -->
    <div id="text"> <!-- Your text -->
        <div class="step">1. Make the charts appear</div>
        <div class="step">2. Show Person 1 emotions</div>
        <div class="step">3. Show Person 2 emotions</div>

    </div> 
</div>



  </body>
</html>
