<!doctype html>
<html>
  <head>

    <!-- some basic stuff  -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated SVG</title>

    <!-- 
      add your stylesheet 
      base.css loads the basic stuff
      you can tweak your css in custom.css
      WARNING: the order of the stylesheets matters
    -->
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="custom.css">

    <!-- add your d3 script -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <!-- add Scrollama -->
    <script src="https://unpkg.com/scrollama"></script>

    <!-- your JS code that uses d3 to manipulate data -->

    <!-- 
      Special instructions for loading external data:  
      1) add the type="module" attribute to your script tag
      2) use the await keyword to load your data with d3.csv(), so the data is loaded asynchronously. 
    -->

    <script type="module">

      // load the data
      const data = await d3.csv('happiness-sample-data.csv'); 

      // using d3 time parsers to get the week and weekday of each date in the data
      const stringToTime = d3.utcParse('%m/%d/%Y');
      const getWeek = d3.utcFormat("%V");
      const getWeekDay = d3.utcFormat("%u");
      const getMonth = d3.utcFormat("%m");

      // create the SVG element and set its width and height
      const myChart = d3
        .select('#my-svg-chart')
        .append('svg')
        .attr('width', 640)
        .attr('height', 640)

      // create a circle for each data point
      const individualCharts = myChart
        .selectAll('circle')
        .data(data)
        .join('circle');

      // set the position and radius of each circle

      const gridSize = 20, gap = 2;

      individualCharts
        .attr('cx', (d,i) => {
          return getWeekDay(stringToTime(d.Date)) * (gridSize + gap) + gridSize/2;
        })
        .attr('cy', (d,i) => {
          return getWeek(stringToTime(d.Date)) * (gridSize + gap) 
            + gridSize/2 + (getMonth(stringToTime(d.Date)) - 1) * gridSize*2;
        })
        .attr('r', gridSize/2)

      
      // set the color of each circle based on the data value

      individualCharts
        .style('fill', d=> {
            if (d.Happiness == '1') {return 'black'}
            else if (d.Happiness == '2') {return 'grey'}
            else {return 'gold'}
          })
      


    </script>

  </head>
  <body>
    <h1>100 days of happiness</h1>
    <p></p>
    <!-- putting your buttons here -->
    <div id="my-svg-chart"></div>


  </body>
</html>
